name: CI

on:
  - push
  - pull_request

jobs:

  checks:

    env:
      POEXAM_VERSION: "0.0.12"

    strategy:
      matrix:
        os:
          - ubuntu-26.04

    runs-on: ${{ matrix.os }}

    steps:

    - uses: actions/checkout@v7

    - name: Install gettext
      run: sudo apt-get install gettext

    - name: Cache poexam
      id: cache-poexam
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/poexam
        key: poexam-${{ env.POEXAM_VERSION }}-${{ runner.os }}

    - name: Install poexam
      if: steps.cache-poexam.outputs.cache-hit != 'true'
      run: cargo install --version "$POEXAM_VERSION" poexam

    - name: Check gettext files
      run: make gettext

  build:

    strategy:
      matrix:
        os:
          - ubuntu-26.04
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    name: Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    steps:

      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pylint pylint-django typing-extensions

      - name: Lint with flake8
        run: make flake8

      - name: Lint with pylint
        run: make pylint
